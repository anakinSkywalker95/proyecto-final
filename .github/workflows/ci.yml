name: CI - Lint y Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint con Pylint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache de pip para acelerar ejecuciones futuras
      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Pylint
        run: |
          pylint app/ wsgi.py \
            --fail-under=7.0 \
            --rcfile=.pylintrc

  tests:
    name: Tests con Pytest
    runs-on: ubuntu-latest
    needs: lint   # Los tests solo corren si el lint pasa

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Reutiliza la caché del job de lint si está disponible
      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests con Pytest
        env:
          FLASK_ENV: testing
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      # Muestra resumen de cobertura en el PR (opcional pero útil)
      - name: Mostrar resumen de cobertura
        if: always()
        run: |
          echo "## Resumen de cobertura" >> $GITHUB_STEP_SUMMARY
          python -m pytest --co -q 2>/dev/null | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo "Cobertura minima requerida: 70%" >> $GITHUB_STEP_SUMMARY
