version: "3.8"

# ═══════════════════════════════════════════════════════
#  Red interna para comunicación entre servicios
# ═══════════════════════════════════════════════════════
networks:
  red_tareas:
    driver: bridge

# ═══════════════════════════════════════════════════════
#  Volúmenes para persistencia de datos
# ═══════════════════════════════════════════════════════
volumes:
  postgres_data:
    name: tareas_postgres_data

services:

  # ─────────────────────────────────────────────────────
  #  Base de datos PostgreSQL
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tareas_postgres
    restart: unless-stopped
    networks:
      - red_tareas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tareas_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tareas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────
  #  Aplicación Flask
  # ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tareas_app
    restart: unless-stopped
    networks:
      - red_tareas
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-cambia-esto-en-produccion}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tareas_db}
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
